name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "v$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version v$PKG_VERSION"
            exit 1
          fi

      - name: Lint
        run: bun run lint

      - name: Typecheck
        # Use the locally-resolved tsc: `bunx tsc` would silently fetch the unrelated
        # (deprecated, TS 2.x) `tsc` package if the local one ever stopped hoisting,
        # turning this gate into a no-op instead of failing.
        run: ./node_modules/.bin/tsc --noEmit

      - run: bun run build

      # Node 20 ships npm 10, which supports --provenance. Provenance works with token
      # auth given `id-token: write` above and a public repo; it does not replace auth.
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}